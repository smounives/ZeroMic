name: Build and Release ZeroMic

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '手动指定版本号 (如 v0.0.1)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # === Windows 系列 ===
          - os: windows-latest
            python_arch: x64       # 环境必须是 x64 才能成功安装
            target_arch: x86_64    # 打包目标 x64
            target_name: windows-x64
            
          - os: windows-latest
            python_arch: x64       # 欺骗环境：用 x64 的 Python
            target_arch: arm64     # 交叉编译：强制打包成 arm64
            target_name: windows-arm64
            
          # === Linux 系列 ===
          - os: ubuntu-latest
            python_arch: x64
            target_arch: x86_64
            target_name: linux-x64
            
          # === macOS 系列 (Apple Silicon) ===
          - os: macos-14
            python_arch: arm64
            target_arch: arm64
            target_name: macos-arm64
            
          # === macOS 系列 (官方最新免费 Intel 节点) ===
          - os: macos-15-intel
            python_arch: x64
            target_arch: x86_64
            target_name: macos-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python_arch }} # 严格根据矩阵配置环境

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev python3-dev

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${{ runner.os }}" = "Windows" ]; then
            [ -f requirements-windows.txt ] && pip install -r requirements-windows.txt
          fi
          pip install pyinstaller

      - name: Get Version String
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      # === Windows 独立构建 (利用 PowerShell 和 Spec 变量) ===
      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        env:
          TARGET_ARCH: ${{ matrix.target_arch }} # 关键：传给 main.spec
        run: |
          pyinstaller --noconfirm main.spec
          Move-Item -Path "dist\ZeroMic.exe" -Destination "dist\ZeroMic-${{ steps.version.outputs.tag }}-${{ matrix.target_name }}.exe" -Force
        shell: pwsh

      # === Linux/macOS 独立构建 (利用 Bash 和 Spec 变量) ===
      - name: Build with PyInstaller (Unix)
        if: runner.os != 'Windows'
        env:
          TARGET_ARCH: ${{ matrix.target_arch }} # 关键：传给 main.spec
        run: |
          pyinstaller --noconfirm main.spec
          mv dist/ZeroMic dist/ZeroMic-${{ steps.version.outputs.tag }}-${{ matrix.target_name }}
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZeroMic-${{ matrix.target_name }}
          path: dist/ZeroMic-*
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          files: release-files/*
          generate_release_notes: true
