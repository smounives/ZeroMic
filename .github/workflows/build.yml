name: Build and Release ZeroMic

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 方便你手动点按钮测试

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: ZeroMic-Win.exe
          - os: ubuntu-latest
            artifact_name: ZeroMic-Linux
          - os: macos-latest
            artifact_name: ZeroMic-macOS

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # 注意：Ubuntu 24.04 需使用 4.1 版本
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev python3-dev

      - name: Install Python Dependencies
        shell: bash # 统一使用 bash 避免 PowerShell 报错
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            if [ -f requirements-windows.txt ]; then
              pip install -r requirements-windows.txt
            fi
          fi
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          # 仅使用 .spec 文件，不再添加 --name 等参数
          pyinstaller --noconfirm main.spec

      - name: Rename Output (Optional)
        shell: bash
        run: |
          # 如果你的 spec 默认生成的文件名不是矩阵要求的，可以在这里改名
          # 假设 spec 生成的是 dist/main 或 dist/ZeroMic
          cd dist
          mv * "${{ matrix.artifact_name }}" || true 

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/ZeroMic-Win.exe/ZeroMic-Win.exe
            ./artifacts/ZeroMic-Linux/ZeroMic-Linux
            ./artifacts/ZeroMic-macOS/ZeroMic-macOS
          generate_release_notes: true
