name: Build and Release ZeroMic

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '手动指定版本号 (如 v0.0.1)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows (统一发 x64)
          - os: windows-latest
            arch: x64
            target: windows-x64
            
          # Linux (x64)
          - os: ubuntu-latest
            arch: x64
            target: linux-x64
            
          # macOS Apple Silicon (ARM64)
          - os: macos-14
            arch: arm64
            target: macos-arm64
            
          # macOS Intel (使用官方最新的免费 Intel 节点！)
          - os: macos-15-intel
            arch: x64
            target: macos-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev python3-dev

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${{ runner.os }}" = "Windows" ]; then
            [ -f requirements-windows.txt ] && pip install -r requirements-windows.txt
          fi
          pip install pyinstaller

      - name: Get Version String
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      # === Windows 独立构建 ===
      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        env:
          TARGET_ARCH: x86_64
        run: |
          # 纯净命令，不带参数干扰
          pyinstaller --noconfirm main.spec
          # 使用 PowerShell 原生命令重命名
          Move-Item -Path "dist\ZeroMic.exe" -Destination "dist\ZeroMic-${{ steps.version.outputs.tag }}-${{ matrix.target }}.exe" -Force
        shell: pwsh

      # === Linux/macOS 独立构建 ===
      - name: Build with PyInstaller (Unix)
        if: runner.os != 'Windows'
        env:
          TARGET_ARCH: ${{ matrix.arch == 'x64' && 'x86_64' || 'arm64' }}
        run: |
          # 纯净命令
          pyinstaller --noconfirm main.spec
          # 使用 bash 原生命令重命名
          mv dist/ZeroMic dist/ZeroMic-${{ steps.version.outputs.tag }}-${{ matrix.target }}
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZeroMic-${{ matrix.target }}
          path: dist/ZeroMic-*
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          files: release-files/*
          generate_release_notes: true
