name: Build and Release ZeroMic

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 & ARM64
          - os: windows-latest
            arch: x86_64
            artifact_name: Windows-x64.exe
          - os: windows-latest
            arch: arm64
            artifact_name: Windows-arm64.exe
          # Linux x64
          - os: ubuntu-latest
            arch: x86_64
            artifact_name: Linux-x64
          # macOS x64 & ARM64 (Apple Silicon)
          - os: macos-latest
            arch: x86_64
            artifact_name: macOS-x64
          - os: macos-latest
            arch: arm64
            artifact_name: macOS-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Get Version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME:-v-dev}" >> $GITHUB_ENV

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev python3-dev

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            [ -f requirements-windows.txt ] && pip install -r requirements-windows.txt
          fi
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        env:
          # 核心改动：通过环境变量将架构传给 main.spec
          TARGET_ARCH: ${{ matrix.arch }} 
        run: |
          # 命令行必须极其干净，不能有任何多余参数
          pyinstaller --noconfirm main.spec

      - name: Rename and Prepare
        shell: bash
        run: |
          FINAL_NAME="ZeroMic-${{ env.VERSION }}-${{ matrix.artifact_name }}"
          cd dist
          # 兼容不同系统的默认输出名并重命名
          mv ZeroMic.exe "$FINAL_NAME" || mv ZeroMic "$FINAL_NAME" || mv main* "$FINAL_NAME"
          echo "FINAL_PATH=dist/$FINAL_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.FINAL_PATH }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          generate_release_notes: true
