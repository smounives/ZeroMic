name: Build and Release ZeroMic

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            arch: x64
            artifact_name: ZeroMic-Windows-x64.exe
          # Linux x64
          - os: ubuntu-latest
            arch: x64
            artifact_name: ZeroMic-Linux-x64
          # macOS x64 (Intel)
          - os: macos-latest
            arch: x64
            artifact_name: ZeroMic-macOS-x64
          # macOS arm64 (Apple Silicon)
          - os: macos-latest
            arch: arm64
            artifact_name: ZeroMic-macOS-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Get Version from Tag
        shell: bash
        run: |
          # 提取版本号 (例如 v0.0.3)，如果没有标签则默认使用 v-dev
          VERSION=${GITHUB_REF_NAME:-v-dev}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev python3-dev

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            [ -f requirements-windows.txt ] && pip install -r requirements-windows.txt
          fi
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          # 运行构建，注意：macOS 使用 --target-arch 处理不同架构
          ARCH_ARGS=""
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            ARCH_ARGS="--target-arch ${{ matrix.arch }}"
          fi
          
          pyinstaller --noconfirm $ARCH_ARGS main.spec

      - name: Rename and Prepare Artifact
        shell: bash
        run: |
          # 组装最终文件名：项目名-版本号-系统-架构
          FINAL_NAME="ZeroMic-${{ env.VERSION }}-${{ matrix.artifact_name }}"
          cd dist
          # 将 spec 生成的默认文件名（假设是 ZeroMic）重命名为带版本的格式
          mv ZeroMic* "$FINAL_NAME" || mv main* "$FINAL_NAME"
          echo "FINAL_RELEASE_PATH=dist/$FINAL_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.FINAL_RELEASE_PATH }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 使用通配符自动包含所有命名的二进制文件
          files: ./artifacts/**/*
          generate_release_notes: true
