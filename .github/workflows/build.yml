name: Build and Release ZeroMic

on:
  workflow_dispatch:
      
permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: ZeroMic-Win.exe
          - os: ubuntu-latest
            artifact_name: ZeroMic-Linux
          - os: macos-latest
            artifact_name: ZeroMic-macOS

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev python3-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 只有 Windows 安装专属依赖
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            if [ -f requirements-windows.txt ]; then
              pip install -r requirements-windows.txt
            fi
          fi
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          # 因为你改了 spec，所以这里直接跑 spec 即可
          # --noconfirm 确保覆盖旧文件，--name 确保生成的文件名符合矩阵定义
          pyinstaller --noconfirm main.spec --name "${{ matrix.artifact_name }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/ZeroMic-Win.exe/ZeroMic-Win.exe
            ./artifacts/ZeroMic-Linux/ZeroMic-Linux
            ./artifacts/ZeroMic-macOS/ZeroMic-macOS
          generate_release_notes: true
          draft: false
          prerelease: false
