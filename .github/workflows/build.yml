name: Build and Release ZeroMic

on:
  push:
    tags:
      - 'v*' # 当推送标签如 v0.0.3 时触发

permissions:
  contents: write # 赋予创建 Release 的权限

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: ZeroMic-Win.exe
            req_file: requirements-windows.txt
          - os: ubuntu-latest
            artifact_name: ZeroMic-Linux
            req_file: requirements.txt
          - os: macos-latest
            artifact_name: ZeroMic-macOS
            req_file: requirements.txt

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # 自动缓存依赖，加快后续构建

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev python3-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 如果是 Windows，额外安装专属依赖
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pip install -r requirements-windows.txt
          fi
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          # 优先使用你项目中的 main.spec 进行构建
          pyinstaller --noconfirm main.spec --name "${{ matrix.artifact_name }}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/ZeroMic-Win.exe/ZeroMic-Win.exe
            ./artifacts/ZeroMic-Linux/ZeroMic-Linux
            ./artifacts/ZeroMic-macOS/ZeroMic-macOS
          generate_release_notes: true # 自动生成更新日志
          draft: false
          prerelease: false
